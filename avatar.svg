<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a1a00"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <radialGradient id="drum_face" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f5f0e0"/>
      <stop offset="100%" stop-color="#d4c8a8"/>
    </radialGradient>
    <radialGradient id="cymbal" cx="40%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8B7500"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>
  <!-- Impact lines radiating out -->
  <line x1="128" y1="80" x2="128" y2="20" stroke="#ff6600" stroke-width="1" opacity="0.15"/>
  <line x1="168" y1="90" x2="210" y2="40" stroke="#ff6600" stroke-width="1" opacity="0.15"/>
  <line x1="88" y1="90" x2="46" y2="40" stroke="#ff6600" stroke-width="1" opacity="0.15"/>
  <line x1="188" y1="128" x2="240" y2="128" stroke="#ff6600" stroke-width="1" opacity="0.15"/>
  <line x1="68" y1="128" x2="16" y2="128" stroke="#ff6600" stroke-width="1" opacity="0.15"/>
  <!-- Kick drum (front view) -->
  <circle cx="128" cy="140" r="50" fill="#1a0a00" stroke="#d4af37" stroke-width="2"/>
  <circle cx="128" cy="140" r="45" fill="none" stroke="#8B4513" stroke-width="1"/>
  <circle cx="128" cy="140" r="38" fill="url(#drum_face)" opacity="0.9"/>
  <!-- Kick drum port hole -->
  <circle cx="140" cy="148" r="8" fill="#1a0a00"/>
  <!-- Amber Vistalite shell reflection -->
  <path d="M83,120 Q78,140 83,160" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.4"/>
  <path d="M173,120 Q178,140 173,160" fill="none" stroke="#ff8c00" stroke-width="2" opacity="0.4"/>
  <!-- Hi-hat (left) -->
  <ellipse cx="62" cy="85" rx="22" ry="6" fill="url(#cymbal)" opacity="0.8"/>
  <ellipse cx="62" cy="83" rx="20" ry="5" fill="url(#cymbal)" opacity="0.7"/>
  <!-- Hi-hat stand -->
  <line x1="62" y1="90" x2="62" y2="120" stroke="#c0c0c0" stroke-width="1.5"/>
  <!-- Snare drum -->
  <ellipse cx="95" cy="110" rx="20" ry="7" fill="#f5f0e0" stroke="#c0c0c0" stroke-width="1"/>
  <rect x="75" y="110" width="40" height="12" fill="#d4c8a8" stroke="#c0c0c0" stroke-width="0.5"/>
  <ellipse cx="95" cy="122" rx="20" ry="7" fill="#c0b898" stroke="#c0c0c0" stroke-width="1"/>
  <!-- High tom -->
  <ellipse cx="112" cy="80" rx="16" ry="5" fill="#ff8c00" opacity="0.6" stroke="#d4af37" stroke-width="0.5"/>
  <rect x="96" y="80" width="32" height="10" fill="#cc7000" opacity="0.5"/>
  <!-- Mid tom -->
  <ellipse cx="145" cy="80" rx="16" ry="5" fill="#ff8c00" opacity="0.6" stroke="#d4af37" stroke-width="0.5"/>
  <rect x="129" y="80" width="32" height="10" fill="#cc7000" opacity="0.5"/>
  <!-- Floor tom (right) -->
  <ellipse cx="175" cy="115" rx="22" ry="7" fill="#ff8c00" opacity="0.6" stroke="#d4af37" stroke-width="0.5"/>
  <rect x="153" y="115" width="44" height="18" fill="#cc7000" opacity="0.5"/>
  <ellipse cx="175" cy="133" rx="22" ry="7" fill="#cc5500" opacity="0.5" stroke="#d4af37" stroke-width="0.5"/>
  <!-- Crash cymbal (left) -->
  <ellipse cx="55" cy="55" rx="25" ry="6" fill="url(#cymbal)" opacity="0.7"/>
  <circle cx="55" cy="55" r="3" fill="#d4af37"/>
  <line x1="55" y1="60" x2="58" y2="85" stroke="#c0c0c0" stroke-width="1.5"/>
  <!-- Ride cymbal (right) -->
  <ellipse cx="200" cy="65" rx="28" ry="7" fill="url(#cymbal)" opacity="0.6"/>
  <circle cx="200" cy="65" r="3" fill="#d4af37"/>
  <line x1="200" y1="71" x2="195" y2="110" stroke="#c0c0c0" stroke-width="1.5"/>
  <!-- Drumsticks crossed -->
  <line x1="100" y1="50" x2="155" y2="105" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/>
  <line x1="155" y1="50" x2="100" y2="105" stroke="#d4a574" stroke-width="3" stroke-linecap="round"/>
  <!-- Stick tips -->
  <circle cx="155" cy="105" r="2.5" fill="#f5e6c8"/>
  <circle cx="100" cy="105" r="2.5" fill="#f5e6c8"/>
  <!-- Text -->
  <text x="128" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#d4af37" font-weight="bold">BONES</text>
</svg>
